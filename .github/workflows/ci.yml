name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: 'Upload release artifacts'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          libudev-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev
          libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  build:
    name: Build (${{ matrix.name }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: dmm-tools-linux-x86_64
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dmm-tools-windows-x86_64
          - name: macOS (ARM)
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: dmm-tools-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libudev-dev libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev
          libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows' && inputs.upload_artifacts
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ut61eplus staging/
          cp target/${{ matrix.target }}/release/ut61eplus-gui staging/
          cp README.md LICENSE staging/
          cp -r udev staging/ || true

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows' && inputs.upload_artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ut61eplus.exe staging/
          cp target/${{ matrix.target }}/release/ut61eplus-gui.exe staging/
          cp README.md LICENSE staging/

      - name: Upload artifact
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/
